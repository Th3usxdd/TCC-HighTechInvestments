name: Invest PR - CI

# O workflow roda sempre que você der 'push' ou abrir um 'pull request' na branch main ou master
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
    # 1. Copia os arquivos do seu repositório para a máquina virtual do GitHub
    - name: Checkout do código
      uses: actions/checkout@v4

    # 2. Prepara o ambiente com o Node.js
    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 3. Instala as dependências (Usando 'npm install' para evitar o erro do package-lock)
    - name: Instalar Dependências
      run: npm install

    # 4. Verifica se o código do site possui erros de sintaxe ou padronização
    - name: Executar Linter
      run: npm run lint --if-present

    # 5. Roda testes automatizados (se você tiver configurado no projeto)
    - name: Executar Testes
      run: npm test --if-present

    # 6. Tenta buildar o site para garantir que tudo compila perfeitamente
    - name: Validar Build de Produção
      run: npm run build
